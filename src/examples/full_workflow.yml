---
description: >
    Complete CI/CD workflow with PR checks, main branch testing,
    and automated release tagging. Demonstrates branch-filtered
    workflows for pull requests and trunk.
usage:
    version: 2.1
    orbs:
        ios-orb: kevnm67/ios-orb@3.0.0
    workflows:
        pr:
            when:
                not:
                    equal: [main, << pipeline.git.branch >>]
            jobs:
                - ios-orb/run_with_setup:
                      name: setup
                      xcode_version: 26.3.0
                      xcode_project: MyApp
                      scripts:
                          - ios-orb/install_tools:
                                tools: xcodegen swiftlint
                          - ios-orb/xcodegen
                - ios-orb/run_with_setup:
                      name: lint
                      attach_workspace: true
                      checkout: false
                      scripts:
                          - ios-orb/swiftlint:
                                strict: true
                      requires:
                          - setup
                - ios-orb/test:
                      name: test
                      xcode_version: 26.3.0
                      xcode_project: MyApp
                      lane: test
                      requires:
                          - setup
        main:
            when:
                equal: [main, << pipeline.git.branch >>]
            jobs:
                - ios-orb/run_with_setup:
                      name: setup
                      xcode_version: 26.3.0
                      xcode_project: MyApp
                      scripts:
                          - ios-orb/install_tools:
                                tools: xcodegen swiftlint
                          - ios-orb/xcodegen
                - ios-orb/test:
                      name: test
                      xcode_version: 26.3.0
                      xcode_project: MyApp
                      lane: test
                      requires:
                          - setup
                - ios-orb/run_with_setup:
                      name: tag-release
                      attach_workspace: true
                      checkout: false
                      scripts:
                          - run:
                                name: Create release tag
                                command: |
                                    VERSION=$(date +%Y.%m.%d)-${CIRCLE_BUILD_NUM}
                                    git tag "v${VERSION}"
                                    git push origin "v${VERSION}"
                      requires:
                          - test
