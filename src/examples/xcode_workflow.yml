---
description: >
    XcodeGen project workflow with build, test, and code coverage.
    Generates the Xcode project from project.yml, runs tests via Fastlane,
    and uploads coverage to Qlty Cloud.
usage:
    version: 2.1
    orbs:
        ios-orb: kevnm67/ios-orb@3.0.0
    workflows:
        build-test:
            jobs:
                - ios-orb/run_with_setup:
                      name: setup
                      xcode_version: 26.3.0
                      xcode_project: MyApp
                      scripts:
                          - ios-orb/install_tools:
                                tools: xcodegen swiftlint
                          - ios-orb/xcodegen
                - ios-orb/test:
                      name: test
                      xcode_version: 26.3.0
                      xcode_project: MyApp
                      lane: test
                      pretest_steps:
                          - ios-orb/swiftlint:
                                strict: true
                      requires:
                          - setup
