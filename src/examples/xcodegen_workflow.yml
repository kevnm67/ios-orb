---
description: >
    Full workflow with XcodeGen project generation, testing, and deployment.
    Demonstrates the setup → test → deploy pattern.
usage:
    version: 2.1
    orbs:
        ios-orb: kevnm67/ios-orb@3.0.0
    jobs:
        setup:
            executor:
                name: ios-orb/macos
            steps:
                - checkout
                - ios-orb/install_tools:
                      tools: xcodegen swiftlint
                - ios-orb/xcodegen
                - run:
                      name: Install gems
                      command: |
                          bundle config set --local path vendor/bundle
                          bundle install
                - persist_to_workspace:
                      root: .
                      paths:
                          - .
        test:
            executor:
                name: ios-orb/macos
            steps:
                - attach_workspace:
                      at: .
                - ios-orb/lane:
                      named: test
                - store_test_results:
                      path: test-results
    workflows:
        build-test:
            jobs:
                - setup
                - test:
                      requires:
                          - setup
