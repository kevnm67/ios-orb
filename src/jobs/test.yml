---
description: Run tests and upload coverage to Qlty Cloud (qlty.sh).

executor:
    name: macos
    xcode_version: <<parameters.xcode_version>>
    resource_class: <<parameters.resource_class>>

parameters:
    attach_workspace:
        default: true
        description: |
            Whether to attach to an existing workspace.
        type: boolean
    checkout:
        default: true
        description: |
            Whether to checkout as a first step.
        type: boolean
    xcode_project:
        description: Name of your xcodeproj for setting the path to the Package.resolved file.
        type: string
        default: ''
    homebrew_no_auto_update:
        default: 1
        description: |
            Whether to auto update homebrew.  Default is 1 (e.g. don't update).
        type: integer
    with_spm:
        description: |
            Setup environment for installing SPM packages (to get around xcbuild errors).
        type: boolean
        default: false
    xcode_version:
        description: Xcode version.
        type: string
        default: 26.3.0
    resource_class:
        description: macOS resource class.
        type: string
        default: m4pro.medium
    logs_path:
        description: Path to build logs.
        type: string
        default: ~/Library/Logs/scan
    build_logs_path:
        description: Path to build logs.
        type: string
        default: ~/Library/Logs/DiagnosticReports/
    test_output_path:
        description: Path to test reports.
        type: string
        default: ./fastlane/test_output
    result_bundle_path:
        description: Path to the xcresult bundle produced by the test run.
        type: string
        default: TestResults.xcresult
    coverage_file:
        description: Path the exported cobertura XML is written to and uploaded from.
        type: string
        default: coverage.xml
    qlty_tag:
        description: Optional Qlty coverage tag (e.g. unit, ui).
        type: string
        default: ''
    qlty_skip_errors:
        description: Whether Qlty upload errors should be non-fatal to the pipeline.
        type: boolean
        default: false
    pretest_steps:
        description: Scripts to run before starting the test command.
        type: steps
        default: []
    test_steps:
        description: Scripts that execute the tests when not using a fastlane lane.
        type: steps
        default: []
    lane:
        description: Lane to run using fastlane.  If not using fastlane you can ignore this param.
        type: string
        default: ''
    scripts:
        description: Scripts to run when setting up the workspace.
        type: steps
        default: []

environment:
    HOMEBREW_NO_AUTO_UPDATE: << parameters.homebrew_no_auto_update >>

steps:
    - setup:
          checkout: << parameters.checkout >>
          attach_workspace: << parameters.attach_workspace >>
          xcode_project: << parameters.xcode_project >>
    - test_with_qlty:
          pretest_steps: << parameters.pretest_steps >>
          test_steps: << parameters.test_steps >>
          lane: << parameters.lane >>
          result_bundle_path: << parameters.result_bundle_path >>
          coverage_file: << parameters.coverage_file >>
          qlty_tag: << parameters.qlty_tag >>
          qlty_skip_errors: << parameters.qlty_skip_errors >>
          xcode_project: << parameters.xcode_project >>
    - save_build_artifacts:
          logs_path: << parameters.logs_path >>
          build_logs_path: << parameters.build_logs_path >>
          test_output_path: << parameters.test_output_path >>
