---
version: 2.1
orbs:
  # Your orb will be automatically injected here during the pipeline.
  # Reference your orb's jobs and commands below as they will exist when built.
    orb-tools: circleci/orb-tools@12.4.0
  # The orb definition is intentionally not included here. It will be injected into the pipeline.
    ios-orb: {}

# Use this tag to ensure test jobs always run,
# even though the downstream publish job will only run on release tags.
filters: &filters
    tags:
        only: /.*/

# Filter for release tags.
release-filters: &release-filters
    branches:
        ignore: /.*/
    tags:
        only: /^v[0-9]+\.[0-9]+\.[0-9]+$/

jobs:
  # Create jobs to test the commands of your orbs.
  # You may want to add additional validation steps to ensure the commands are working as expected.
    command-test:
        executor: ios-orb/macos
        steps:
            - checkout
            - ios-orb/setup:
                  checkout: false
                  persist_workspace: false

    fixture_test:
        executor: ios-orb/macos
        steps:
            - checkout
            - ios-orb/install_tools:
                  tools: xcodegen xcresultparser
            - run:
                  name: Generate Xcode project
                  command: cd tests/fixture && xcodegen generate --quiet
            - ios-orb/build_xcode:
                  scheme: FixtureApp
                  project: tests/fixture/FixtureApp.xcodeproj
                  destination: platform=iOS Simulator,name=iPhone Air
                  configuration: Debug
            - ios-orb/test_xcode:
                  scheme: FixtureApp
                  project: tests/fixture/FixtureApp.xcodeproj
                  destination: platform=iOS Simulator,name=iPhone Air
                  result_bundle_path: tests/fixture/TestResults.xcresult
            - ios-orb/export_coverage:
                  type: xcode
                  result_bundle: tests/fixture/TestResults.xcresult
            - run:
                  name: Check coverage threshold (≥80%)
                  command: ./scripts/ci/check_coverage_threshold.sh coverage.xml 80
            - ios-orb/upload_qlty_coverage:
                  file: coverage.xml
                  format: cobertura
                  tag: fixture
                  skip_errors: true
            - store_artifacts:
                  path: tests/fixture/TestResults.xcresult
                  destination: xcresult
            - store_artifacts:
                  path: coverage.xml
                  destination: coverage.xml

workflows:
    test-deploy:
        jobs:
      # Make sure to include "filters: *filters" in every test job you want to run as part of your deployment.
      # Test your orb's commands in a custom job and test your orb's jobs directly as a part of this workflow.
            - command-test:
                  filters: *filters
            - fixture_test:
                  filters: *filters
                  context: qlty-credentials
            - orb-tools/pack:
                  filters: *release-filters
            - orb-tools/publish:
                  orb_name: kevnm67/ios-orb
                  vcs_type: << pipeline.project.type >>
                  pub_type: production
                  requires:
                      - orb-tools/pack
                      - command-test
                      - fixture_test
                  context: orb-publishing
                  filters: *release-filters
