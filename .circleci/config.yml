---
version: 2.1
setup: true
orbs:
    orb-tools: circleci/orb-tools@12.4.0
    qlty: qltysh/qlty-orb@0.1.1
    shellcheck: circleci/shellcheck@3.4.0

filters: &filters
    tags:
        only: /.*/

jobs:
    script_tests:
        docker:
            - image: cimg/base:current
        steps:
            - checkout
            - run:
                  name: Install bats-core and kcov
                  command: |
                      sudo apt-get update -qq
                      sudo apt-get install -y bats kcov
            - run:
                  name: Run bats + kcov coverage
                  command: ./scripts/ci/run-script-tests.sh
            - qlty/coverage_publish:
                  files: coverage/cobertura.xml
                  format: cobertura

workflows:
    lint-pack:
        jobs:
            - orb-tools/lint:
                  filters: *filters
            - orb-tools/pack:
                  filters: *filters
            - orb-tools/review:
                  orb_name: ios-orb
                  exclude: RC006,RC007,RC008,RC009
                  filters: *filters
            - shellcheck/check:
                  filters: *filters
            - script_tests:
                  context: qlty-credentials
                  filters: *filters
            - orb-tools/continue:
                  pipeline_number: << pipeline.number >>
                  vcs_type: << pipeline.project.type >>
                  orb_name: ios-orb
                  requires: [orb-tools/lint, orb-tools/pack, orb-tools/review, shellcheck/check, script_tests]
                  filters: *filters
