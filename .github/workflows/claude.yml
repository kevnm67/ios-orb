---
name: Claude Code Action
on:
    issue_comment:
        types: [created]
    pull_request_review_comment:
        types: [created]
    issues:
        types: [opened, assigned, labeled]
    pull_request_review:
        types: [submitted]
    pull_request:
        types: [opened, synchronize]

jobs:
    claude-response:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            issues: write
            id-token: write
            actions: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  persist-credentials: false
                  fetch-depth: 0

            - name: Run Claude Code Action
              id: claude
              uses: anthropics/claude-code-action@eee73e2ae5399c561de4ff038aa7b36a7aa991a7 # v1
              with:
                  anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Customize the trigger phrase (default: @claude)
                  trigger_phrase: '@claude'
          # Optional: Use Claude Opus 4.5
          # claude_args: "--model claude-opus-4-5-20251101"
          # Optional: Limit allowed tools
          # claude_args: "--allowedTools Bash(npm:*),View,GlobTool,GrepTool"
