---
name: Claude Code Action
on:
    issue_comment:
        types: [created]
    pull_request_review_comment:
        types: [created]
    issues:
        types: [opened, assigned, labeled]
    pull_request_review:
        types: [submitted]
    pull_request:
        types: [opened, synchronize]

jobs:
    claude-response:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            issues: write
            id-token: write
            actions: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  persist-credentials: false
                  fetch-depth: 0

            - name: Run Claude Code Action
              id: claude
              uses: anthropics/claude-code-action@521136812280ae7ef256e06045655b9da02793f0 # v1
              with:
                  anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Customize the trigger phrase (default: @claude)
                  trigger_phrase: '@claude'
          # Optional: Use Claude Opus 4.5
          # claude_args: "--model claude-opus-4-5-20251101"
          # Optional: Limit allowed tools
          # claude_args: "--allowedTools Bash(npm:*),View,GlobTool,GrepTool"
