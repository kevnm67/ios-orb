---
# actions/labeler v5+ format: each label maps to changed-files matchers.
dependencies:
    - changed-files:
          - any-glob-to-any-file:
                - Gemfile
                - Gemfile.lock
                - Brewfile

enhancement:
    - changed-files:
          - any-glob-to-any-file:
                - src/**

config-iOS:
    - changed-files:
          - any-glob-to-any-file:
                - orbs/ios/**
                - orbs/ios-orb/**

configs-ruby:
    - changed-files:
          - any-glob-to-any-file:
                - '**/ruby/**'

CI/CD:
    - changed-files:
          - any-glob-to-any-file:
                - .circleci/**
                - .codeclimate.yml
                - .dependabot
                - .github/**
                - .pre-commit-config.yaml
                - .ruby-version
                - .swift-version
                - .yamllint
                - Dangerfile
                - fastlane/**
                - Makefile
                - scripts/**

documentation:
    - changed-files:
          - any-glob-to-any-file:
                - CHANGELOG.md
                - doc/**
                - Documentation/**
                - jazzy.yml
                - README.md
